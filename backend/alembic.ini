# Alembic configuration for AI Gym Coach.
#
# Note: sqlalchemy.url is intentionally NOT set here. It is injected at runtime
# in alembic/env.py from app.core.config.settings.DATABASE_URL, so the migration
# runner always matches the app's async driver and there is a single source of
# truth for the connection string (no secret duplicated into this file).

[alembic]
script_location = alembic
prepend_sys_path = .
# Use os.pathsep-separated path segments (silences the legacy-splitting
# DeprecationWarning in Alembic 1.18+).
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
